<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IQ Pizza — Сканер чека</title>

    <!-- html5-qrcode library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        :root {
            --red: #E8001C;
            --dark: #111111;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --muted: #888;
            --green: #22c55e;
            --yellow: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ── HEADER ── */
        .header {
            padding: 20px 20px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            width: 40px;
            height: 40px;
            background: var(--red);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 900;
            color: white;
            letter-spacing: -2px;
            flex-shrink: 0;
        }

        .header-text h1 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.3px;
        }

        .header-text p {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px;
        }

        /* ── MAIN ── */
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ── SCANNER BOX ── */
        .scanner-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .scanner-label {
            padding: 14px 16px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border);
        }

        .scanner-label .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
        }

        .scanner-label .dot.active {
            background: var(--green);
            box-shadow: 0 0 6px var(--green);
            animation: pulse 1.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .scanner-label span {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            color: var(--muted);
        }

        #qr-reader {
            width: 100%;
            min-height: 260px;
        }

        /* Прибираємо стандартні стилі html5-qrcode */
        #qr-reader > div:first-child { display: none !important; }
        #qr-reader__scan_region { border-radius: 0 !important; }
        #qr-reader__scan_region video { border-radius: 0 !important; object-fit: cover; }
        #qr-reader__dashboard { display: none !important; }

        .scanner-hint {
            padding: 10px 16px 14px;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            border-top: 1px solid var(--border);
        }

        /* ── DIVIDER ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── UPLOAD ── */
        .upload-area {
            background: var(--card);
            border: 1.5px dashed var(--border);
            border-radius: 16px;
            padding: 24px 20px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            position: relative;
        }

        .upload-area:active {
            border-color: var(--red);
            background: rgba(232, 0, 28, 0.05);
        }

        .upload-area input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .upload-area h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .upload-area p {
            font-size: 12px;
            color: var(--muted);
        }

        /* ── RESULT CARD ── */
        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .result-card.visible { display: block; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .result-card.success { border-color: rgba(34, 197, 94, 0.3); }
        .result-card.error   { border-color: rgba(232, 0, 28, 0.3); }
        .result-card.pending { border-color: rgba(245, 158, 11, 0.3); }

        .result-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .result-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .result-card.success .result-icon { background: rgba(34, 197, 94, 0.15); }
        .result-card.error   .result-icon { background: rgba(232, 0, 28, 0.15); }
        .result-card.pending .result-icon { background: rgba(245, 158, 11, 0.15); }

        .result-title {
            font-size: 15px;
            font-weight: 700;
        }

        .result-card.success .result-title { color: var(--green); }
        .result-card.error   .result-title { color: var(--red); }
        .result-card.pending .result-title { color: var(--yellow); }

        .result-subtitle {
            font-size: 12px;
            color: var(--muted);
            margin-top: 1px;
        }

        .result-fields {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .field-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }

        .field-label {
            font-size: 12px;
            color: var(--muted);
        }

        .field-value {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .field-value.amount-ok  { color: var(--green); }
        .field-value.amount-bad { color: var(--red); }

        /* ── SUBMIT BUTTON ── */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: -0.2px;
            cursor: pointer;
            display: none;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn-submit.visible { display: block; }
        .btn-submit:active { opacity: 0.85; transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.4; pointer-events: none; }

        /* ── LOADING ── */
        .loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            color: var(--muted);
            font-size: 14px;
        }

        .loading.visible { display: flex; }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── CONDITIONS ── */
        .conditions {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
        }

        .conditions-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 10px;
        }

        .condition-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 5px 0;
            font-size: 13px;
            color: var(--text);
        }

        .condition-row::before {
            content: '○';
            color: var(--muted);
            font-size: 10px;
        }

        .condition-row.met::before { content: '●'; color: var(--green); }
        .condition-row.fail::before { content: '●'; color: var(--red); }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">IQ</div>
        <div class="header-text">
            <h1>IQ Pizza × Coca-Cola</h1>
            <p>Сканер фіскального чека</p>
        </div>
    </div>

    <div class="main">

        <!-- QR SCANNER -->
        <div class="scanner-box">
            <div class="scanner-label">
                <div class="dot" id="scanner-dot"></div>
                <span id="scanner-status">Запуск камери...</span>
            </div>
            <div id="qr-reader"></div>
            <div class="scanner-hint">Наведіть камеру на QR-код у нижній частині чека</div>
        </div>

        <div class="divider">або</div>

        <!-- PHOTO UPLOAD -->
        <div class="upload-area" id="upload-area">
            <input type="file" id="photo-input" accept="image/*" capture="environment">
            <div class="upload-icon">📎</div>
            <h3>Завантажити фото чека</h3>
            <p>Якщо камера не може зчитати QR</p>
        </div>

        <!-- CONDITIONS -->
        <div class="conditions">
            <div class="conditions-title">Умови участі</div>
            <div class="condition-row" id="cond-shop">IQ Pizza</div>
            <div class="condition-row" id="cond-amount">Сума від 300 грн</div>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <span>Перевіряємо чек...</span>
        </div>

        <!-- RESULT -->
        <div class="result-card" id="result-card">
            <div class="result-header">
                <div class="result-icon" id="result-icon">✓</div>
                <div>
                    <div class="result-title" id="result-title">Результат</div>
                    <div class="result-subtitle" id="result-subtitle"></div>
                </div>
            </div>
            <div class="result-fields" id="result-fields"></div>
        </div>

        <!-- SUBMIT -->
        <button class="btn-submit" id="btn-submit" onclick="submitToBotAndClose()">
            Відправити чек боту →
        </button>

    </div>

    <script>
        // ── TELEGRAM INIT ──
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.setHeaderColor('#111111');
            tg.setBackgroundColor('#111111');
        }

        // ── STATE ──
        let scannedQrUrl  = null;   // raw URL from QR
        let parsedQrData  = null;   // { fn, id, amount, date, time }
        let parserResult  = null;   // response from parser
        let uploadedPhoto = null;   // base64 photo (fallback)
        let html5Scanner  = null;
        let scannerStarted = false;

        // ── PARSER URL — замінити на свій ──
        const PARSER_URL = 'https://YOUR_PARSER_URL/api/verify-qr';

        // ── START QR SCANNER ──
        async function startQrScanner() {
            try {
                html5Scanner = new Html5Qrcode('qr-reader');

                await html5Scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 240, height: 240 } },
                    onQrCodeScanned,
                    () => {}
                );

                scannerStarted = true;
                document.getElementById('scanner-dot').classList.add('active');
                document.getElementById('scanner-status').textContent = 'Камера активна';

            } catch (err) {
                document.getElementById('scanner-status').textContent = 'Камера недоступна';
                console.warn('Camera error:', err);
            }
        }

        // ── QR SCANNED ──
        async function onQrCodeScanned(decodedText) {
            if (scannedQrUrl === decodedText) return; // уже обработан
            scannedQrUrl = decodedText;

            // Останавливаем сканер
            if (html5Scanner && scannerStarted) {
                await html5Scanner.stop();
                scannerStarted = false;
                document.getElementById('scanner-dot').classList.remove('active');
                document.getElementById('scanner-status').textContent = 'QR зчитано ✓';
            }

            // Проверяем что это чек налоговой
            if (!decodedText.includes('cabinet.tax.gov.ua') && !decodedText.includes('cashregs')) {
                showError('Це не фіскальний чек. Відскануйте QR з чека IQ Pizza.');
                scannedQrUrl = null;
                return;
            }

            parsedQrData = parseQrUrl(decodedText);
            await verifyWithParser(parsedQrData, null);
        }

        // ── PARSE QR URL ──
        function parseQrUrl(url) {
            const params = {};
            try {
                const query = url.split('?')[1] || '';
                query.split('&').forEach(pair => {
                    const [k, v] = pair.split('=');
                    if (k && v) params[k] = decodeURIComponent(v);
                });
            } catch(e) {}
            return params;
        }

        // ── PHOTO UPLOAD (FALLBACK) ──
        document.getElementById('photo-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (ev) => {
                uploadedPhoto = ev.target.result.split(',')[1]; // base64
                await verifyWithParser(null, uploadedPhoto);
            };
            reader.readAsDataURL(file);
        });

        // ── CALL PARSER ──
        async function verifyWithParser(qrParams, photoBase64) {
            showLoading(true);
            hideResult();

            try {
                const body = {};
                if (qrParams) body.qrParams = qrParams;
                if (photoBase64) body.imageBase64 = photoBase64;

                const resp = await fetch(PARSER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });

                if (!resp.ok) throw new Error('Parser error ' + resp.status);

                parserResult = await resp.json();
                showResult(parserResult);

            } catch(err) {
                // Якщо парсер недоступний — показуємо дані з QR і даємо відправити
                if (qrParams && qrParams.sm) {
                    parserResult = {
                        autoApproved: false,
                        autoRejected: false,
                        needsManualCheck: true,
                        amount: parseFloat(qrParams.sm),
                        fiscalNumber: qrParams.fn,
                        receiptId: qrParams.id,
                        reason: 'Парсер недоступний — ручна перевірка'
                    };
                    showResult(parserResult);
                } else {
                    showError('Не вдалося перевірити чек. Спробуйте ще раз.');
                }
            } finally {
                showLoading(false);
            }
        }

        // ── SHOW RESULT ──
        function showResult(result) {
            const card   = document.getElementById('result-card');
            const icon   = document.getElementById('result-icon');
            const title  = document.getElementById('result-title');
            const sub    = document.getElementById('result-subtitle');
            const fields = document.getElementById('result-fields');
            const btn    = document.getElementById('btn-submit');
            const condShop   = document.getElementById('cond-shop');
            const condAmount = document.getElementById('cond-amount');

            card.className = 'result-card visible';
            fields.innerHTML = '';

            if (result.autoApproved) {
                card.classList.add('success');
                icon.textContent = '✓';
                title.textContent = 'Чек прийнято!';
                sub.textContent   = result.reason || '';
                condShop.className   = 'condition-row met';
                condAmount.className = 'condition-row met';
            } else if (result.autoRejected) {
                card.classList.add('error');
                icon.textContent = '✕';
                title.textContent = 'Чек відхилено';
                sub.textContent   = result.reason || '';
                condShop.className   = result.reason?.includes('IQ Pizza') ? 'condition-row fail' : 'condition-row met';
                condAmount.className = result.amount < 300 ? 'condition-row fail' : 'condition-row met';
            } else {
                card.classList.add('pending');
                icon.textContent = '~';
                title.textContent = 'Передано на перевірку';
                sub.textContent   = result.reason || '';
                condShop.className   = 'condition-row';
                condAmount.className = result.amount >= 300 ? 'condition-row met' : 'condition-row';
            }

            // Поля
            if (result.amount)       addField(fields, 'Сума', result.amount + ' грн', result.amount >= 300 ? 'amount-ok' : 'amount-bad');
            if (result.fiscalNumber) addField(fields, 'ФН ПРРО', result.fiscalNumber);
            if (result.receiptId)    addField(fields, 'Номер чека', result.receiptId);
            if (result.receiptDate)  addField(fields, 'Дата', result.receiptDate);

            // Кнопка — показуємо якщо не autoRejected
            if (!result.autoRejected) {
                btn.classList.add('visible');
            } else {
                btn.classList.remove('visible');
            }
        }

        function addField(container, label, value, valueClass = '') {
            container.innerHTML += `
                <div class="field-row">
                    <span class="field-label">${label}</span>
                    <span class="field-value ${valueClass}">${value}</span>
                </div>`;
        }

        function showError(msg) {
            const card = document.getElementById('result-card');
            card.className = 'result-card visible error';
            document.getElementById('result-icon').textContent = '!';
            document.getElementById('result-title').textContent = 'Помилка';
            document.getElementById('result-subtitle').textContent = msg;
            document.getElementById('result-fields').innerHTML = '';
            document.getElementById('btn-submit').classList.remove('visible');
        }

        function hideResult() {
            document.getElementById('result-card').className = 'result-card';
            document.getElementById('btn-submit').classList.remove('visible');
        }

        function showLoading(show) {
            document.getElementById('loading').className = show ? 'loading visible' : 'loading';
        }

        // ── SEND TO BOT AND CLOSE ──
        function submitToBotAndClose() {
            const data = {
                qrUrl:        scannedQrUrl,
                qrParams:     parsedQrData,
                parserResult: parserResult,
                hasPhoto:     !!uploadedPhoto
            };

            if (tg) {
                tg.sendData(JSON.stringify(data));
            } else {
                // Для теста в браузере
                alert('Відправлено: ' + JSON.stringify(data, null, 2));
            }
        }

        // ── INIT ──
        startQrScanner();
    </script>
</body>
</html>
