<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IQ Pizza — Сканер чека</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --red: #E8001C;
            --dark: #111111;
            --card: #1a1a1a;
            --border: #2a2a2a;
            --text: #f0f0f0;
            --muted: #888;
            --green: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px 20px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .logo {
            width: 40px; height: 40px;
            background: var(--red);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 900; color: white;
            flex-shrink: 0;
        }
        .header-text h1 { font-size: 16px; font-weight: 700; }
        .header-text p { font-size: 12px; color: var(--muted); margin-top: 1px; }
        .main { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
        .scanner-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .scanner-label {
            padding: 14px 16px 10px;
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid var(--border);
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
        .dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s ease infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
        .scanner-label span { font-size: 13px; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: .3px; }
        #qr-reader { width: 100%; min-height: 260px; }
        #qr-reader > div:first-child { display: none !important; }
        #qr-reader__dashboard { display: none !important; }
        #qr-reader__scan_region video { object-fit: cover; }
        .scanner-hint { padding: 10px 16px 14px; font-size: 12px; color: var(--muted); text-align: center; border-top: 1px solid var(--border); }
        .result-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            display: none;
            animation: slideIn .3s ease;
        }
        .result-card.visible { display: block; }
        @keyframes slideIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .result-card.success { border-color: rgba(34,197,94,.3); }
        .result-card.error { border-color: rgba(232,0,28,.3); }
        .result-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .result-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .result-card.success .result-icon { background: rgba(34,197,94,.15); }
        .result-card.error .result-icon { background: rgba(232,0,28,.15); }
        .result-title { font-size: 15px; font-weight: 700; }
        .result-card.success .result-title { color: var(--green); }
        .result-card.error .result-title { color: var(--red); }
        .result-subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }
        .field-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: rgba(255,255,255,.03); border-radius: 8px; margin-bottom: 6px; }
        .field-label { font-size: 12px; color: var(--muted); }
        .field-value { font-size: 13px; font-weight: 600; }
        .btn-submit {
            width: 100%; padding: 16px;
            background: var(--red); color: white;
            border: none; border-radius: 14px;
            font-size: 16px; font-weight: 700;
            cursor: pointer; display: none;
            transition: opacity .2s, transform .1s;
        }
        .btn-submit.visible { display: block; }
        .btn-submit:active { opacity: .85; transform: scale(.98); }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">IQ</div>
        <div class="header-text">
            <h1>IQ Pizza × Coca-Cola</h1>
            <p>Сканер фіскального чека</p>
        </div>
    </div>

    <div class="main">
        <div class="scanner-box">
            <div class="scanner-label">
                <div class="dot" id="scanner-dot"></div>
                <span id="scanner-status">Запуск камери...</span>
            </div>
            <div id="qr-reader"></div>
            <div class="scanner-hint">Наведіть камеру на QR-код у нижній частині чека</div>
        </div>

        <div class="result-card" id="result-card">
            <div class="result-header">
                <div class="result-icon" id="result-icon"></div>
                <div>
                    <div class="result-title" id="result-title"></div>
                    <div class="result-subtitle" id="result-subtitle"></div>
                </div>
            </div>
            <div id="result-fields"></div>
        </div>

        <button class="btn-submit" id="btn-submit" onclick="submitToBotAndClose()">
            Відправити боту →
        </button>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#111111'); tg.setBackgroundColor('#111111'); }

        let scannedQrUrl = null;
        let parsedParams = null;
        let html5Scanner = null;
        let scannerStarted = false;

        async function startQrScanner() {
            try {
                html5Scanner = new Html5Qrcode('qr-reader');
                await html5Scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 240, height: 240 } },
                    onQrScanned, () => {}
                );
                scannerStarted = true;
                document.getElementById('scanner-dot').classList.add('active');
                document.getElementById('scanner-status').textContent = 'Камера активна';
            } catch(e) {
                document.getElementById('scanner-status').textContent = 'Камера недоступна';
                document.getElementById('qr-reader').innerHTML =
                    '<div style="padding:30px;text-align:center;color:#888;font-size:14px">Камера недоступна.<br>Надішліть фото чека напряму в бот.</div>';
            }
        }

        async function onQrScanned(text) {
            if (scannedQrUrl === text) return;
            scannedQrUrl = text;

            if (html5Scanner && scannerStarted) {
                await html5Scanner.stop();
                scannerStarted = false;
                document.getElementById('scanner-dot').classList.remove('active');
                document.getElementById('scanner-status').textContent = 'QR зчитано ✓';
            }

            if (!text.includes('cabinet.tax.gov.ua') && !text.includes('cashregs')) {
                const card = document.getElementById('result-card');
                card.className = 'result-card visible error';
                document.getElementById('result-icon').textContent = '!';
                document.getElementById('result-title').textContent = 'Не фіскальний чек';
                document.getElementById('result-subtitle').textContent = 'Відскануйте QR з чека IQ Pizza';
                document.getElementById('result-fields').innerHTML = '';
                document.getElementById('btn-submit').classList.remove('visible');
                scannedQrUrl = null;
                return;
            }

            parsedParams = parseQrUrl(text);
            showQrResult(parsedParams);
        }

        function parseQrUrl(url) {
            const params = {};
            try {
                const query = url.split('?')[1] || '';
                query.split('&').forEach(pair => {
                    const [k, v] = pair.split('=');
                    if (k && v) params[k] = decodeURIComponent(v);
                });
            } catch(e) {}
            return params;
        }

        function showQrResult(params) {
            const card = document.getElementById('result-card');
            card.className = 'result-card visible success';
            document.getElementById('result-icon').textContent = '✓';
            document.getElementById('result-title').textContent = 'QR зчитано успішно';
            document.getElementById('result-subtitle').textContent = 'Натисніть кнопку щоб відправити боту';

            const fields = document.getElementById('result-fields');
            fields.innerHTML = '';
            if (params.sm) fields.innerHTML += `<div class="field-row"><span class="field-label">Сума</span><span class="field-value">${params.sm} грн</span></div>`;
            if (params.fn) fields.innerHTML += `<div class="field-row"><span class="field-label">ФН ПРРО</span><span class="field-value">${params.fn}</span></div>`;
            if (params.id) fields.innerHTML += `<div class="field-row"><span class="field-label">Номер чека</span><span class="field-value">${params.id}</span></div>`;

            document.getElementById('btn-submit').classList.add('visible');
        }

        function submitToBotAndClose() {
            alert('Кнопка натиснута! parsedParams=' + (parsedParams ? JSON.stringify(parsedParams).substring(0,50) : 'NULL'));
            if (!parsedParams) {
                alert('parsedParams is NULL — QR не зчитано');
                return;
            }

            const data = { type: 'qr', qrUrl: scannedQrUrl, qrParams: parsedParams };
            const dataStr = JSON.stringify(data);

            alert('Відправляємо: ' + dataStr.substring(0, 100) + '\nРозмір: ' + dataStr.length + ' байт');

            if (tg) {
                try {
                    tg.sendData(dataStr);
                    alert('sendData викликано — Web App має закритись');
                } catch(e) {
                    alert('ПОМИЛКА: ' + e.message);
                }
            } else {
                alert('tg=NULL — не в Telegram');
            }
        }

        startQrScanner();
    </script>
</body>
</html>
